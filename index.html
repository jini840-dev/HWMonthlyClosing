<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>입금 마감 통계 분석 보고서</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="dashboard-container">
        <header>
            <h1>입금 마감 통계 분석 보고서</h1>
            <div class="report-date" id="report-reference-date">기준일자: 2026-03-03</div>
        </header>

        <main>
            <!-- 데이터 입력 섹션 -->
            <section class="data-input-section card">
                <h2>원시 데이터(Raw Data) 입력</h2>
                <p>탭(Tab)으로 구분된 통계 데이터를 아래에 붙여넣기 하세요. (첫 줄은 항목명 포함)</p>
                <textarea id="raw-data-input" rows="8" placeholder="거래일자&#9;거래시간..."></textarea>
                <button id="process-data-btn" class="btn-primary">데이터 분석 실행</button>
            </section>

            <!-- 분석 결과 섹션 (기본은 숨김 또는 0으로 표시) -->
            <div id="report-results" class="results-container">
                <section class="summary-section grid-container">
                    <div class="card summary-card">
                        <h3>총 증번건수</h3>
                        <div class="stats main-stat"><span id="total-reg-count">0</span> 건</div>
                    </div>
                    <div class="card summary-card">
                        <h3>총 처리건수 (TR)</h3>
                        <div class="stats main-stat"><span id="total-processed-count">0</span> 건</div>
                    </div>
                </section>

                <section class="detailed-reports grid-container">
                    <div class="card report-card">
                        <h3>거래일자별 요약</h3>
                        <div id="date-report-list" class="stat-list">
                            <p class="placeholder-text">데이터를 입력하면 집계 결과가 표시됩니다.</p>
                        </div>
                    </div>
                    <div class="card report-card">
                        <h3>시간대별(30분단위) 요약</h3>
                        <div id="time-report-list" class="stat-list">
                        </div>
                    </div>
                    <div class="card report-card">
                        <h3>입출금방법별 요약</h3>
                        <div id="method-report-list" class="stat-list">
                        </div>
                    </div>
                    <div class="card report-card">
                        <h3>처리기관채널별 요약</h3>
                        <div id="channel-report-list" class="stat-list">
                        </div>
                    </div>
                </section>
            </div>

            <!-- 과거 데이터 비교 섹션 -->
            <section class="comparison-section">
                <h2 class="section-title">과거 데이터 비교 분석</h2>
                <div class="grid-container">
                    <div class="card">
                        <h3 id="month-minus-1-title">M-1월 처리량</h3>
                        <div class="stats">
                            <span id="month-minus-1-amount">0</span> 건
                        </div>
                        <div class="trend" id="month-minus-1-trend"></div>
                    </div>
                    <div class="card">
                        <h3 id="month-minus-2-title">M-2월 처리량</h3>
                        <div class="stats">
                            <span id="month-minus-2-amount">0</span> 건
                        </div>
                        <div class="trend" id="month-minus-2-trend"></div>
                    </div>
                    <div class="card">
                        <h3 id="month-minus-3-title">M-3월 처리량</h3>
                        <div class="stats">
                            <span id="month-minus-3-amount">0</span> 건
                        </div>
                        <div class="trend" id="month-minus-3-trend"></div>
                    </div>
                    <div class="card">
                        <h3>전년 동월 처리량</h3>
                        <div class="stats">
                            <span id="last-year-amount">0</span> 건
                        </div>
                        <div class="trend" id="last-year-trend"></div>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
